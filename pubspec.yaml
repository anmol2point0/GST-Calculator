name: vyapar_calc_app
description: "A Pro Business Calculator with GST and Price Book"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  # CORE FEATURE PACKAGES
  shared_preferences: ^2.2.2   # Local Data Storage
  math_expressions: ^2.3.1     # Math Engine
  http: ^1.1.0                # Live Currency API
  file_picker: ^8.1.7          # Native CSV Import
  share_plus: ^7.2.1           # Native CSV Export/Share

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  # MAGIC ICON GENERATOR
  flutter_launcher_icons: ^0.13.1

# THE ICON CONFIGURATION
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1E1E1E" # Fills the empty background with a sleek dark grey/black
  adaptive_icon_foreground: "assets/icon.png"

flutter:
  uses-material-design: true